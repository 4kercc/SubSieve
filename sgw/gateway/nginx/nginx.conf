user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Restore the real client IP before logging, geo checks, deny rules,
    # and rate limiting evaluate $remote_addr.
    include /etc/nginx/subscribe/real_ip.conf;

    log_format  main  '$remote_addr [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_user_agent"';

    access_log  /var/log/subscribe/access.log  main;
    error_log   /var/log/subscribe/error.log   warn;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # 增大 header 缓冲区，避免客户端（如 Clash/浏览器）发送较大 header 时返回 400
    client_header_buffer_size    8k;
    large_client_header_buffers  4 32k;

    # DNS 解析器：127.0.0.11 为 Docker 内置 DNS（容器网络内始终可用），1.1.1.1 作备用
    # valid=60s 缓存解析结果，上游 IP 变动时自动重新解析
    resolver 127.0.0.11 1.1.1.1 valid=60s ipv6=off;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 云IP识别 + UA规则 + 速率限制（由 update_cloud_geo.sh 生成）
    include /etc/nginx/subscribe/cloud_geo.conf;

    # 白名单geo块（由 reload_whitelist.sh 生成）
    include /etc/nginx/subscribe/whitelist.conf;

    # 自定义封禁UA（由 admin 写入）
    include /etc/nginx/subscribe/ua_custom.conf;

    # UA白名单（由 admin 写入，优先级高于封禁UA）
    include /etc/nginx/subscribe/ua_whitelist.conf;

    # UA 301跳转配置（由 admin 写入，封禁UA可选择跳转而非403）
    include /etc/nginx/subscribe/ua_redirect.conf;

    server {
        listen 80 default_server;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        http2  on;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        error_page 497 =444 @blackhole;
        location @blackhole { return 444; }

        # 黑名单（deny规则，由admin实时写入）
        include /etc/nginx/subscribe/blacklist.conf;

        # 订阅拦截规则
        include /etc/nginx/subscribe/protect.conf;

        location / { return 444; }
    }
}
